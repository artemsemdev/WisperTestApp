name: Feature request
description: Propose an improvement to VoxFlow
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and did not find the same request.
          required: true
        - label: This request is within the local-first scope of the project.
          required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Desktop
        - MCP Server
        - Core transcription pipeline
        - Build or packaging
        - Documentation
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the user or developer problem first.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the behavior, workflow, or API you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Include current workarounds or other approaches you rejected.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, mockups, transcripts, or constraints if relevant. Redact sensitive data.
