name: Documentation improvement
description: Report unclear, missing, or outdated documentation
title: "[Docs]: "
labels:
  - documentation
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
  - type: input
    id: page
    attributes:
      label: Affected document or section
      placeholder: README.md, SETUP.md, docs/product/PRD.md, or a specific section
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is unclear, missing, or incorrect?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: Describe the correction, missing context, or structure change you would make.
